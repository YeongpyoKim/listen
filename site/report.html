<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>변경된 정보 제보하기 - 동네 한 바퀴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .report-page { padding: 40px 22px 60px; }
    .report-page h1 { font-family: var(--serif); text-align: center; margin-bottom: 8px; }
    .report-page .lead { text-align: center; color: var(--ink-soft); margin-bottom: 30px; font-size: 14px; }
    .report-card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 26px; box-shadow: var(--shadow); max-width: 560px; margin: 0 auto; }
    .report-form label { display: block; font-size: 14px; color: var(--ink); margin-bottom: 8px; }
    .report-form .req { color: #b33; }
    .report-form input[type=text], .report-form input:not([type]), .report-form select, .report-form textarea {
      width: 100%; margin-top: 6px; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; font-family: inherit; background: #fff; box-sizing: border-box;
    }
    .report-form textarea { min-height: 100px; resize: vertical; }
    .report-form .help { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }
    .report-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .btn-cancel { background: var(--card); border: 1px solid var(--line); padding: 12px 24px; border-radius: 999px; font-size: 14px; cursor: pointer; color: var(--ink-soft); }
    .btn-submit { background: var(--ink); border: none; color: #fff; padding: 12px 24px; border-radius: 999px; font-size: 14px; cursor: pointer; }
    .report-msg { text-align: center; margin-top: 16px; min-height: 20px; font-size: 13px; color: var(--gold); }
    .report-msg.err { color: #b33; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; font-size: 14px; color: var(--ink); text-decoration: none; }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="wrap report-page">
    <a href="index.html" class="back-link">← 동네 한 바퀴로 돌아가기</a>
    <h1>변경된 정보 제보하기</h1>
    <p class="lead">알려주신 정보는 확인 후 신속하게 반영됩니다. 감사합니다! 🌿</p>

    <div class="report-card">
      <form id="reportForm" class="report-form">
        <label>제보할 가게 이름 <span class="req">*</span>
          <input name="store_name" required maxlength="60" placeholder="예) 마곡 손칼국수" />
        </label>

        <label>제보 유형 <span class="req">*</span>
          <select name="report_type" required>
            <option value="">선택해 주세요</option>
            <option value="hours">영업시간 변경</option>
            <option value="closed">휴업/폐점</option>
            <option value="moved">이동 (주소 변경)</option>
            <option value="menu">메뉴 변경</option>
            <option value="price">가격 변경</option>
            <option value="phone">전화번호 변경</option>
            <option value="other">기타</option>
          </select>
        </label>

        <label>현재 정보 (알고 계신 대로)
          <input name="current_info" maxlength="120" placeholder="예) 평일 10 시~20 시로 알고 있어요" />
        </label>

        <label>제보할 내용 <span class="req">*</span>
          <textarea name="report_content" required maxlength="500" placeholder="변경된 정보를 자세히 적어 주세요."></textarea>
        </label>

        <label>참고 자료 (선택)
          <input name="reference" maxlength="120" placeholder="네이버 지도 링크 등이 있다면 적어 주세요" />
        </label>

        <label>제보자 성함 (선택)
          <input name="reporter" maxlength="40" placeholder="이름 또는 별명" />
        </label>

        <label>비밀번호 <span class="req">*</span>
          <input name="password" type="password" maxlength="40" placeholder="나중에 수정/삭제할 때 쓸 비밀번호 (4 자 이상)" />
        </label>

        <div class="report-actions">
          <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
          <button type="submit" class="btn-submit">제보하기</button>
        </div>

        <div class="report-msg" id="reportMsg"></div>
      </form>
    </div>
  </div>

  <!-- Vercel API Base URL for backend API calls -->
  <script>
    window.LH_API_BASE = 'https://listen-main.vercel.app';
  </script>
  <script src="js/report.js"></script>
</body>
</html>
